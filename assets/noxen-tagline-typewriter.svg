<svg xmlns="http://www.w3.org/2000/svg"
     width="1200"
     height="64"
     viewBox="0 0 1200 64"
     role="img"
     aria-labelledby="title desc">
  <title id="title">Noxen fields</title>
  <desc id="desc">A centered typewriter animation showing reverse engineering, security tooling, and odd experiments.</desc>

  <style>
    .text {
      fill: #d8d8d2;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 16px;
      letter-spacing: .15px;
    }

    .reveal {
      transform-box: fill-box;
      transform-origin: left center;
      animation: reveal 6.4s steps(57, end) infinite;
    }

    .caret {
      fill: #f1f1ed;
      animation:
        caret-move 6.4s steps(57, end) infinite,
        caret-blink .82s step-end infinite;
    }

    @keyframes reveal {
      0%, 8% {
        transform: scaleX(0);
      }
      50%, 70% {
        transform: scaleX(1);
      }
      94%, 100% {
        transform: scaleX(0);
      }
    }

    @keyframes caret-move {
      0%, 8% {
        transform: translateX(0);
      }
      50%, 70% {
        transform: translateX(528px);
      }
      94%, 100% {
        transform: translateX(0);
      }
    }

    @keyframes caret-blink {
      0%, 49% {
        opacity: 1;
      }
      50%, 100% {
        opacity: 0;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .reveal,
      .caret {
        animation: none !important;
      }

      .caret {
        opacity: 0;
      }
    }
  </style>

  <mask id="type-mask"
        x="336"
        y="12"
        width="528"
        height="40"
        maskUnits="userSpaceOnUse">
    <rect class="reveal"
          x="336"
          y="12"
          width="528"
          height="40"
          fill="#fff"/>
  </mask>

  <text class="text"
        x="336"
        y="39"
        textLength="528"
        lengthAdjust="spacingAndGlyphs"
        mask="url(#type-mask)">reverse engineering / security tooling / odd experiments</text>

  <rect class="caret"
        x="336"
        y="20"
        width="2"
        height="23"
        rx="1"/>
</svg>
