<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="360" viewBox="0 0 1200 360" role="img" aria-labelledby="title desc">
  <title id="title">Noxen index</title>
  <desc id="desc">A restrained monochrome cover with subtle motion, debugger addresses and a radar-like construction.</desc>
  <style>
    .title{animation:coverIn .9s cubic-bezier(.2,.8,.2,1) both}
    .meta{animation:coverIn .7s .18s cubic-bezier(.2,.8,.2,1) both}
    .rule{transform-origin:50% 50%;animation:scan 1.05s .1s cubic-bezier(.2,.8,.2,1) both}
    .radar-arm{transform-box:fill-box;transform-origin:center;animation:radar 12s linear infinite}
    .target{animation:blink 3.8s ease-in-out infinite}
    @keyframes coverIn{from{opacity:0;transform:translateX(-10px)}to{opacity:1;transform:translateX(0)}}
    @keyframes scan{from{transform:scaleY(0)}to{transform:scaleY(1)}}
    @keyframes radar{to{transform:rotate(360deg)}}
    @keyframes blink{0%,72%,100%{opacity:1}78%{opacity:.25}84%{opacity:1}}
    @media (prefers-reduced-motion:reduce){.title,.meta,.rule,.radar-arm,.target{animation:none!important}}
  </style>
  <rect width="1200" height="360" fill="#101010"/>
  <g fill="none" stroke="#303030" stroke-width="1">
    <path d="M48 48H1152M48 312H1152M48 48V312M1152 48V312"/>
    <path d="M48 104H1152M48 256H1152" stroke-dasharray="2 8"/>
    <path d="M816 48V312"/>
  </g>
  <g font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace">
    <text class="meta" x="76" y="88" fill="#777" font-size="13" letter-spacing="2">INDEX / 2026.07</text>
    <text class="title" x="74" y="204" fill="#f1f1ed" font-size="92" font-weight="600" letter-spacing="-4">Noxen</text>
    <text class="meta" x="80" y="244" fill="#999" font-size="15" letter-spacing="1.5">reverse / build / repeat</text>
    <text class="meta" x="842" y="86" fill="#777" font-size="12">0x004E4F58</text>
    <text class="meta" x="842" y="108" fill="#777" font-size="12">0x00454E20</text>
    <text class="meta" x="842" y="286" fill="#777" font-size="12">selected work →</text>
  </g>
  <g transform="translate(984 180)" fill="none">
    <circle r="78" stroke="#444"/>
    <circle r="42" stroke="#303030"/>
    <path d="M-92 0H92M0-92V92" stroke="#303030"/>
    <path d="M-55 55L55-55" stroke="#252525"/>
    <g class="radar-arm">
      <path d="M0 0L24-31" stroke="#777"/>
      <circle cx="24" cy="-31" r="4" fill="#d44" stroke="none"/>
    </g>
    <circle class="target" cx="-38" cy="22" r="3" fill="#aaa" stroke="none"/>
  </g>
  <rect class="rule" x="48" y="48" width="5" height="264" fill="#d44"/>
</svg>
