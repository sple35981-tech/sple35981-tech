<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="460" viewBox="0 0 1200 460" role="img" aria-labelledby="title desc">
<title id="title">Noxen Core</title><desc id="desc">Animated deep-space identity artwork for Noxen.</desc>
<defs>
<radialGradient id="bg"><stop stop-color="#111b35"/><stop offset=".55" stop-color="#070b16"/><stop offset="1" stop-color="#020308"/></radialGradient>
<radialGradient id="core"><stop stop-color="#e0f2fe"/><stop offset=".2" stop-color="#60a5fa"/><stop offset=".55" stop-color="#7c3aed"/><stop offset="1" stop-color="#050816"/></radialGradient>
<linearGradient id="line"><stop stop-color="#38bdf8"/><stop offset="1" stop-color="#a78bfa"/></linearGradient>
<filter id="glow"><feGaussianBlur stdDeviation="10" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
<pattern id="grid" width="44" height="44" patternUnits="userSpaceOnUse"><path d="M44 0H0V44" fill="none" stroke="#fff" stroke-opacity=".025"/></pattern>
</defs>
<rect width="1200" height="460" rx="26" fill="url(#bg)"/><rect width="1200" height="460" rx="26" fill="url(#grid)"/>
<g fill="#fff"><circle cx="96" cy="82" r="1"/><circle cx="190" cy="330" r="1.4"/><circle cx="1010" cy="90" r="1.2"/><circle cx="1090" cy="340" r="1"/><circle cx="860" cy="55" r=".8"/></g>
<g transform="translate(600 230)">
<circle r="112" fill="#2563eb" opacity=".09" filter="url(#glow)"><animate attributeName="r" values="105;125;105" dur="5s" repeatCount="indefinite"/></circle>
<circle r="68" fill="url(#core)" filter="url(#glow)"/>
<ellipse rx="166" ry="42" fill="none" stroke="url(#line)" stroke-width="2" opacity=".75"><animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="18s" repeatCount="indefinite"/></ellipse>
<ellipse rx="138" ry="138" fill="none" stroke="#60a5fa" stroke-opacity=".25" stroke-dasharray="3 10"><animateTransform attributeName="transform" type="rotate" from="360" to="0" dur="26s" repeatCount="indefinite"/></ellipse>
<circle cx="166" r="5" fill="#e0f2fe" filter="url(#glow)"><animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="18s" repeatCount="indefinite"/></circle>
</g>
<g font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace" letter-spacing="3">
<text x="70" y="78" fill="#64748b" font-size="13">IDENTITY NODE / 07</text>
<text x="70" y="118" fill="#e2e8f0" font-size="24">NOXEN</text>
<text x="70" y="150" fill="#38bdf8" font-size="12">SIGNAL: ACTIVE</text>
<text x="895" y="350" fill="#64748b" font-size="12">UNKNOWN ORIGIN</text>
<text x="895" y="382" fill="#a78bfa" font-size="12">ACCESS GRANTED</text>
<text x="600" y="425" text-anchor="middle" fill="#94a3b8" font-size="15">ENTER THE SPACE</text>
</g>
<path d="M70 185h210M920 315h210" stroke="url(#line)" stroke-width="2" opacity=".5"/>
</svg>