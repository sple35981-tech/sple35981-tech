<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="360" viewBox="0 0 1200 360" role="img" aria-labelledby="title desc">
  <title id="title">Noxen signature motion cover</title>
  <desc id="desc">A continuous Noxen signature writes from left to right, pauses, retracts, and repeats. A radar remains on the right.</desc>
  <style>
    :root{--bg:#101010;--ink:#f1f1ed;--muted:#777;--line:#303030;--accent:#d44}
    .meta{opacity:0;animation:fade-in .7s .15s ease forwards}
    .rule{transform-origin:50px 180px;animation:rule-in .8s ease both}
    .signature{
      fill:none;stroke:var(--ink);stroke-width:5.4;stroke-linecap:round;stroke-linejoin:round;
      stroke-dasharray:1;stroke-dashoffset:1;
      animation:signature-loop 5.4s cubic-bezier(.62,.02,.38,.98) infinite
    }
    .radar-arm{transform-origin:984px 180px;animation:radar 12s linear infinite}
    .target{animation:blink 3.8s ease-in-out infinite}
    @keyframes fade-in{to{opacity:1}}
    @keyframes rule-in{from{transform:scaleY(0)}to{transform:scaleY(1)}}
    @keyframes signature-loop{
      0%,8%{stroke-dashoffset:1}
      45%,57%{stroke-dashoffset:0}
      92%,100%{stroke-dashoffset:1}
    }
    @keyframes radar{to{transform:rotate(360deg)}}
    @keyframes blink{0%,72%,100%{opacity:1}78%{opacity:.2}84%{opacity:.85}}
    @media (prefers-reduced-motion:reduce){
      .meta,.rule,.radar-arm,.target,.signature{animation:none!important}
      .signature{stroke-dashoffset:0}
      .meta{opacity:1}
    }
  </style>

  <rect width="1200" height="360" fill="var(--bg)"/>

  <!-- Only the outer frame remains; the two dashed horizontal guide lines are removed. -->
  <g fill="none" stroke="var(--line)" stroke-width="1">
    <path d="M48 48H1152M48 312H1152M48 48V312M1152 48V312"/>
  </g>

  <rect class="rule" x="48" y="48" width="5" height="264" fill="var(--accent)"/>

  <g class="meta" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace">
    <text x="76" y="88" fill="var(--muted)" font-size="13" letter-spacing="2">INDEX / 2026.07</text>
    <text x="80" y="292" fill="#999" font-size="15" letter-spacing="1.5">reverse / build / repeat</text>
    <text x="842" y="86" fill="var(--muted)" font-size="12">0x004E4F58</text>
    <text x="842" y="108" fill="var(--muted)" font-size="12">0x00454E20</text>
    <text x="842" y="286" fill="var(--muted)" font-size="12">selected work →</text>
  </g>

  <path class="signature" pathLength="1" d="M 92 248
C 128 214, 166 156, 204 102
C 214 87, 224 99, 219 122
L 196 234
C 191 260, 198 274, 211 274
C 228 274, 244 250, 255 223
L 292 132
C 299 115, 308 117, 302 136
L 266 230
C 258 250, 265 264, 281 264
C 297 264, 307 248, 317 230
C 328 209, 346 200, 360 207
C 375 214, 375 232, 363 245
C 351 258, 331 264, 315 258
C 302 253, 301 238, 310 224
C 322 206, 342 202, 359 211
C 375 220, 384 240, 398 247
C 414 255, 429 241, 444 220
L 472 255
L 503 219
C 516 204, 529 205, 522 224
C 514 246, 497 259, 480 259
C 462 259, 458 244, 467 230
C 478 211, 497 205, 515 214
C 532 222, 538 244, 554 251
C 571 258, 587 240, 599 219
C 609 202, 623 205, 618 224
L 610 251
C 607 262, 616 266, 625 256
L 649 226
C 659 214, 671 214, 667 230
L 658 254
C 655 264, 663 267, 672 258
C 689 241, 705 222, 724 219
C 743 216, 752 227, 744 239
C 735 252, 712 259, 692 255
C 711 262, 744 263, 777 259
C 805 256, 830 252, 858 257
C 874 260, 884 260, 894 257"/>

  <g fill="none">
    <circle cx="984" cy="180" r="78" stroke="#444"/>
    <circle cx="984" cy="180" r="42" stroke="#303030"/>
    <path d="M892 180H1076M984 88V272" stroke="#303030"/>
    <path d="M929 235L1039 125" stroke="#252525"/>
    <circle class="target" cx="946" cy="202" r="3" fill="#aaa" stroke="none"/>
    <g class="radar-arm">
      <path d="M984 180L1008 149" stroke="#777"/>
      <circle cx="1008" cy="149" r="4" fill="var(--accent)" stroke="none"/>
    </g>
  </g>
</svg>
